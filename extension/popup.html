<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>ShadowShield Guard</title>
  </head>
  <body>
    <form id="config">
      <div class="brand"><span>SS</span><strong>ShadowShield Guard</strong></div>
      <label>
        Employee email
        <input id="employeeEmail" type="email" required placeholder="rahul@company.com" />
      </label>
      <label>
        Backend URL
        <input id="apiBaseUrl" type="url" required placeholder="http://localhost:3000" />
      </label>
      <button type="submit">Save</button>
      <p id="status"></p>
    </form>
    <script src="popup.js"></script>
  </body>
</html>
